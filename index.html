<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>shopping-cart</title>
    <script type="module" src="/src/main.js" defer></script>
  </head>
  <body class="min-w-60 max-w-330 xl:max-w-380 mx-auto bg-gray-300/50">
    <!-- CONTAINER -->
    <div
      class="flex flex-col rounded-xl bg-grey inset-ring-gray-200 2xlg:grid 2xlg:grid-cols-[900px_minmax(120px,1fr)] gap-6 md:mx-5 min-w-85"
    >
      <!-- NAV CONTAINER -->
      <div
        class="flex p-5 rounded-t-xl bg-white w-full col-1 -col-end-1 min-w-60"
      >
        <header class="flex grow">
          <!-- LOGO -->
          <div class="flex grow">
            <h1
              class="ml-3 2xl:ml-4.5 text-lg font-semibold tracking-tight cursor-pointer"
            >
              E_Store.
            </h1>
          </div>
          <div
            class="relative mr-3.5 text-white text-sm font-[550] bg-black/93 hover:bg-black/88 py-1.5 px-4 rounded-sm 2xlg:hidden cursor-pointer flex"
          >
            <img
              class="w-5 mr-2"
              src="./src/assets/shopping-cart-svgrepo-com2.svg"
              alt="shopping cart icon"
            />
            <p>Cart</p>
            <div
              class="bg-white rounded-full absolute -top-2 -right-2 px-1.5 text-black"
            >
              0
            </div>
          </div>
          <nav
            class="font-semibold text-sm hidden 2xlg:flex mx-auto w-6/11 mt-1.5"
          >
            <ul class="flex space-x-2">
              <li>
                <a class="nav-hover" href="#">Home</a>
              </li>
              <li><a class="nav-hover" href="#">Rings</a></li>
              <li><a class="nav-hover" href="#">Necklace</a></li>
              <li><a class="nav-hover" href="#">Earrings</a></li>
              <li><a class="nav-hover" href="#">Campaign</a></li>
              <li><a class="nav-hover" href="#">Catalog</a></li>
            </ul>
          </nav>
        </header>
        <!-- ICONS -->
        <figure class="hidden mr-10 2xlg:flex justify-end w-80 relative">
          <img
            class="icon-2 mr-1.5 order-last"
            src="./src/assets/shopping-cart-svgrepo-com.svg"
            alt="shopping cart icon"
          /><span
            class="text-white absolute mx-auto order-first w-2 rounded-full bg-black cursor-pointer -right-2 text-[11px] px-3.5"
            >0</span
          >

          <img
            class="icon mr-0"
            src="./src/assets/search-svgrepo-com.svg"
            alt="search icon"
          />
          <img
            class="icon"
            src="./src/assets/person-outline-svgrepo-com.svg"
            alt="person outline icon"
          />
        </figure>
      </div>
      <!-- NAV END CONTAINER -->

      <!-- START SHOPPING CART CONTAINER -->
      <section
        id="htmlContainer"
        class="mx-3 px-5 rounded-xl 2xlg:col-1 2xlg:ml-20 bg-white lg:mb-20 min-w-60"
      >
        <h2 class="font-semibold text-2xl ml-3 p-3 rounded-t-2xl">
          Shopping Cart
        </h2>
        <span class="flex border opacity-5 mx-2"></span>
        <!-- PRODUCT COLUMN -->
        <div
          class="flex justify-between text-xs p-2 md:grid md:grid-cols-6 md:text-[15px]"
        >
          <p class="ml-2.5 2xlg:pl-5">Product</p>
          <p class="hidden md:block md:text-center md:col-4">Quantity</p>
          <p class="hidden md:block md:mx-auto">Price</p>
        </div>
      </section>
      <!-- END SHOPPING CART CONTAINER -->

      <!-- ORDER SUMMARY SECTION -->
      <section class="bg-white rounded-xl mx-5 px-5 h-fit lg:mr-20 min-w-60">
        <h3 class="font-semibold text-2xl ml-3 p-3 rounded-t-2xl">
          Order Summary
        </h3>
        <span class="flex border opacity-5 mx-2"></span>
        <div class="p-2 grid grid-cols-2 gap-2 my-auto">
          <p class="opacity-70">Subtotal</p>
          <p id="subPrice" class="text-end">$1,809.95</p>
          <p class="opacity-70">Discount (10%)</p>
          <p id="discount" class="text-end">-$181.00</p>
          <p class="opacity-70">Tax (7%)</p>
          <p id="tax" class="text-end">$1,266.96</p>
        </div>
        <span class="flex border opacity-5 mx-2 my-4"></span>
        <div class="flex justify-between">
          <p class="text-xl font-semibold">Total</p>
          <p id="overall-total" class="my-auto text-xl font-medium">
            $2,895.82
          </p>
        </div>
        <div class="flex mx-auto text-white text-[15px] tracking-wider">
          <button
            type="button"
            class="mx-auto my-15 py-3 px-8 w-full rounded-md duration-75 ease-in cursor-pointer bg-black hover:bg-black/95 focus:outline-1 focus:outline-black focus:outline-offset-2 md:max-xl:max-w-80"
          >
            Process Order
          </button>
        </div>
      </section>
      <aside id="aside" class="flex gap-6 my-6 ml-6 w-fit">
        <p class="p-3 font-medium tracking-wide">Back</p>
        <button
          type="button"
          class="bg-red-600 text-white py-3 px-8 text-center rounded-md text-[15px] tracking-wider hover:bg-red-700 duration-75 ease-in cursor-pointer min-w-10"
        >
          Cancel Order
        </button>
      </aside>
    </div>
  </body>
</html>
